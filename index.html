<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
  <title>FitCat · Elysium Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #0a0a0f; min-height: 100vh; }
    body {
      background: transparent;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #ffffff;
      padding: 16px 12px 40px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(0, 240, 255, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(180, 0, 255, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 40% 80%, rgba(0, 255, 200, 0.08) 0%, transparent 50%),
        #0a0a0f;
      z-index: -2;
      animation: nebulaBreathe 20s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)" opacity="0.03"/%3E%3C/svg%3E');
      opacity: 0.5;
      pointer-events: none;
      z-index: -1;
    }
    @keyframes nebulaBreathe {
      0% { opacity: 0.8; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.05); }
    }
    .app { max-width: 500px; margin: 0 auto; animation: fadeSlide 0.6s cubic-bezier(0.2,0.9,0.3,1); }
    @keyframes fadeSlide { 0% { opacity: 0; transform: translateY(24px); } 100% { opacity: 1; transform: translateY(0); } }

    /* Карточка — Жидкое Стекло */
    .card {
      position: relative;
      background: rgba(15, 20, 30, 0.35);
      backdrop-filter: blur(20px) saturate(200%);
      -webkit-backdrop-filter: blur(20px) saturate(200%);
      border-radius: 40px;
      padding: 24px 20px;
      margin-bottom: 22px;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6), 0 0 0 1px rgba(0, 240, 255, 0.1) inset;
      transition: transform 0.3s ease, box-shadow 0.4s ease;
      border: 1px solid transparent;
      background-clip: padding-box;
      animation: cardGlow 6s ease-in-out infinite alternate;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: conic-gradient(from 0deg, #00F0FF, #B400FF, #00FFC8, #00F0FF);
      border-radius: 42px;
      z-index: -1;
      opacity: 0.6;
      animation: borderRotate 8s linear infinite;
    }
    @keyframes borderRotate { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    @keyframes cardGlow { 0% { box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6), 0 0 20px rgba(0,240,255,0.1) inset; } 100% { box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6), 0 0 40px rgba(180,0,255,0.15) inset; } }

    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .greeting-wrapper { position: relative; height: 54px; min-width: 160px; }
    .greeting-slide { position: absolute; top: 0; left: 0; right: 0; }
    .greeting-slide h1 {
      font-size: 32px; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(145deg, #ffffff, #00F0FF, #B400FF);
      background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: shimmerText 4s ease-in-out infinite;
      text-shadow: 0 0 30px rgba(0,240,255,0.5);
    }
    @keyframes shimmerText { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

    h2 {
      font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
      color: #ffffff; margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(0,240,255,0.3);
    }

    /* Инпуты — Неоновый киберпанк */
    input, select {
      width: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px);
      border: none; border-bottom: 2px solid rgba(0, 240, 255, 0.5);
      border-radius: 20px 20px 8px 8px; padding: 16px 18px;
      font-size: 16px; font-family: 'Space Mono', monospace; color: #fff;
      outline: none; transition: all 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    input:focus {
      border-bottom: 2px solid #00F0FF;
      box-shadow: 0 0 30px rgba(0,240,255,0.3), 0 8px 20px rgba(0,0,0,0.3);
    }
    input::placeholder { color: rgba(255,255,255,0.4); font-family: 'Inter', sans-serif; }

    /* Кнопки — Глюк-эффект */
    .btn-primary {
      width: 100%; border: none; border-radius: 60px 20px 60px 20px;
      padding: 18px 24px; font-size: 18px; font-weight: 700;
      background: linear-gradient(145deg, #00F0FF, #B400FF); color: #0a0a0f;
      box-shadow: 0 12px 30px -5px rgba(0,240,255,0.4);
      cursor: pointer; transition: all 0.2s;
      text-transform: uppercase; letter-spacing: 1px;
      font-family: 'Space Mono', monospace;
    }
    .btn-primary:active {
      transform: scale(0.96);
      box-shadow: 5px 5px 0 #00F0FF, -5px -5px 0 #B400FF, 0 12px 30px -5px rgba(0,240,255,0.6);
    }

    /* Кольца — Квантовые */
    .rings-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: space-around; margin: 20px 0 10px; }
    .ring-container { text-align: center; width: 100px; }
    .ring-canvas { width: 100px; height: 100px; display: block; margin: 0 auto 10px; filter: drop-shadow(0 0 15px currentColor); }
    .ring-label {
      font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
      color: rgba(255,255,255,0.7);
    }
    .ring-value {
      font-size: 20px; font-weight: 800; font-family: 'Space Mono', monospace;
      color: #fff; text-shadow: 0 0 15px currentColor;
    }

    /* Вкладки */
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab {
      flex:1; text-align:center; padding:16px; background:rgba(15,20,30,0.5); backdrop-filter:blur(12px);
      border-radius: 30px 10px 30px 10px; font-weight:700; color:rgba(255,255,255,0.6);
      border:1px solid rgba(0,240,255,0.2); cursor: pointer; transition: 0.2s;
    }
    .tab.active { background: linear-gradient(145deg, #00F0FF, #B400FF); color:#0a0a0f; box-shadow: 0 0 30px #00F0FF; }

    .food-item {
      display:flex; align-items:center; gap:12px; padding:16px; background:rgba(0,0,0,0.2);
      backdrop-filter:blur(8px); border-radius:24px; margin-bottom:10px; border:1px solid rgba(0,240,255,0.15);
    }
  </style>
</head>
<body>
<div class="app">
  <div id="mainPage">
    <div class="header-row">
      <div class="greeting-wrapper"><div class="greeting-slide"><h1>Elysium</h1></div></div>
      <div class="header-actions"><span class="streak-emoji">🔥</span></div>
    </div>
    <div class="tabs"><div class="tab active">Сегодня</div><div class="tab">Активность</div><div class="tab">Вес</div></div>

    <!-- КОЛЬЦА -->
    <div class="card">
      <h2>⚡ Квантовые кольца</h2>
      <div class="rings-grid" id="ringsContainer"></div>
    </div>

    <!-- ВОДА -->
    <div class="card">
      <h2>💧 Живая вода</h2>
      <div style="text-align:center;"><span id="waterCurrent" style="font-size:36px;font-family:'Space Mono';font-weight:800;">0</span><span style="color:rgba(255,255,255,0.5);">/</span><span id="waterGoal">2000 мл</span></div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <div class="water-btn" style="flex:1;padding:14px;background:rgba(0,240,255,0.1);border-radius:20px;text-align:center;cursor:pointer;" onclick="addWater(100)">+100</div>
        <div class="water-btn" style="flex:1;padding:14px;background:rgba(180,0,255,0.1);border-radius:20px;text-align:center;cursor:pointer;" onclick="addWater(200)">+200</div>
      </div>
    </div>

    <!-- ПРОДУКТЫ -->
    <div class="card">
      <h2>🍣 Нейро-еда</h2>
      <div id="foodListContainer"></div>
      <div style="display:flex;gap:10px;margin:16px 0;"><input id="foodName" placeholder="Название"><input id="foodWeight" placeholder="Вес, г" type="number"></div>
      <button class="btn-primary" onclick="addFood()">+ Добавить</button>
    </div>
  </div>
</div>

<script>
  // УРЕЗАННЫЙ ФУНКЦИОНАЛ (только для демонстрации дизайна)
  let waterAmount = 0;
  let todayFoods = [];
  const dailyTargets = { kcal: 2200, protein: 120, fat: 60, carbs: 250, water: 2000 };

  function $(id) { return document.getElementById(id); }

  function drawRing(canvasId, value, max, color) {
    let canvas = $(canvasId); if(!canvas) return;
    let ctx = canvas.getContext('2d'), w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    let percent = Math.min(value/max, 1), start = -0.5 * Math.PI, end = start + (2 * Math.PI * percent);
    // Трек
    ctx.beginPath(); ctx.arc(w/2, h/2, w/2-6, 0, 2*Math.PI);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 8; ctx.stroke();
    // Градиент по кругу
    let gradient = ctx.createConicGradient(start, w/2, h/2);
    gradient.addColorStop(0, color); gradient.addColorStop(0.5, '#B400FF'); gradient.addColorStop(1, color);
    ctx.beginPath(); ctx.arc(w/2, h/2, w/2-6, start, end);
    ctx.strokeStyle = gradient; ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.stroke();
    // Искра на конце
    if(percent > 0) {
      let endX = w/2 + (w/2-6) * Math.cos(end), endY = h/2 + (h/2-6) * Math.sin(end);
      ctx.beginPath(); ctx.arc(endX, endY, 5, 0, 2*Math.PI);
      ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 20; ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  function renderRings() {
    let totals = {kcal:0, protein:0, fat:0, carbs:0};
    todayFoods.forEach(f=>{ totals.kcal+=f.kcal||0; totals.protein+=f.protein||0; totals.fat+=f.fat||0; totals.carbs+=f.carbs||0; });
    let rings = [
      {id:'ringKcal', val:totals.kcal, max:dailyTargets.kcal, col:'#FF6B6B', label:'Ккал'},
      {id:'ringProt', val:totals.protein, max:dailyTargets.protein, col:'#00F0FF', label:'Белки'},
      {id:'ringFat', val:totals.fat, max:dailyTargets.fat, col:'#FFD93D', label:'Жиры'},
      {id:'ringCarbs', val:totals.carbs, max:dailyTargets.carbs, col:'#00FFC8', label:'Углеводы'},
      {id:'ringWater', val:waterAmount, max:dailyTargets.water, col:'#B400FF', label:'Вода'}
    ];
    let html = '';
    rings.forEach(r=>{ html+=`<div class="ring-container"><canvas id="${r.id}" class="ring-canvas" width="100" height="100"></canvas><div class="ring-label">${r.label}</div><div class="ring-value">${Math.round(r.val)}/${r.max}</div></div>`; });
    $('ringsContainer').innerHTML = html;
    rings.forEach(r=> drawRing(r.id, r.val, r.max, r.col) );
    $('waterCurrent').innerText = waterAmount;
    $('waterGoal').innerText = dailyTargets.water + ' мл';
  }

  window.addWater = (ml) => { waterAmount = Math.max(0, Math.min(waterAmount+ml, dailyTargets.water)); renderRings(); };
  window.addFood = () => {
    let name = $('foodName').value.trim(), weight = parseFloat($('foodWeight').value);
    if(!name || !weight) return;
    todayFoods.push({name, weight, kcal: weight*2.5, protein: weight*0.1, fat: weight*0.05, carbs: weight*0.3});
    renderFoodList(); renderRings();
    $('foodName').value = $('foodWeight').value = '';
  };
  function renderFoodList() {
    $('foodListContainer').innerHTML = todayFoods.map((f,i)=>`<div class="food-item"><span>${f.name} ${f.weight}г</span><span onclick="deleteFood(${i})" style="cursor:pointer;color:#FF6B6B;">✕</span></div>`).join('');
  }
  window.deleteFood = (i) => { todayFoods.splice(i,1); renderFoodList(); renderRings(); };

  // Старт
  renderRings();
  renderFoodList();
</script>
</body>
</html>
